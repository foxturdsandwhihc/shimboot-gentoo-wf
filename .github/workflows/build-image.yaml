name: build-image
run-name: Build the shimboot disk image for all boards
on: [push]

jobs:
  build:
    permissions:
      contents: write

    strategy: 
      matrix:
        board: [dedede]
        runner: [ubuntu-24.04]
        include:
          - board: octopus
            runner: ubuntu-24.04
          - board: coral
            runner: ubuntu-24.04
          - board: grunt
            runner: ubuntu-24.04
          - board: nissa
            runner: ubuntu-24.04
          - board: zork
            runner: ubuntu-24.04
          - board: hatch
            runner: ubuntu-24.04
          - board: snappy
            runner: ubuntu-24.04
          - board: brya
            runner: ubuntu-24.04
          - board: corsola
            runner: ubuntu-24.04-arm
          - board: jacuzzi
            runner: ubuntu-24.04-arm
          - board: hana
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Maximize build space
        uses: smallprogram/maximize-build-space@16007771e4642069097fc3e7444638474e5db178
        with:
          root-reserve-mb: 4096
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: remove snap
        uses: ading2210/gh-actions-remove-snap@v1
        with:
          disable_man_db: true

      - name: download repo
        uses: actions/checkout@v4
      
      - name: run build
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y
          sudo DEBUG=1 ./build_complete.sh ${{ matrix.board }} compress_img=1 quiet=1 distro=gentoo

      - name: upload img
        uses: actions/upload-artifact@v4
        with:
          name: shimboot_${{ matrix.board }}
          path: data/shimboot_${{ matrix.board }}.bin
          compression-level: 7
  
      - name: create release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          files: data/shimboot_${{ matrix.board }}.zip
