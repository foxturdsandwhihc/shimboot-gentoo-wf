name: build-image
run-name: Build shimboot image

on: [push]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run build
        run: sudo ./build_complete.sh dedede distro=gentoo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shimboot_dedede
          path: data/shimboot_dedede.img
